services:
  kolosseum_testdb:
    image: postgres:16
    container_name: kolosseum_testdb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kolosseum_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kolosseum_test"]
      interval: 1s
      timeout: 2s
      retries: 30
