name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kolosseum_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d kolosseum_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      CI: true
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/kolosseum_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build + Test
        run: npm test

      - name: Schema apply (drift guard)
        run: node scripts/apply-schema.mjs

        name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kolosseum
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d kolosseum"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=30

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/kolosseum
      PORT: 3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Apply schema
        run: node scripts/apply-schema.mjs --db-url "$DATABASE_URL"

      - name: Start API
        run: |
          nohup node dist/src/server.js > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for /health
        run: |
          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:3000/health" >/dev/null; then
              echo "API is up"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to come up"
          echo "---- server.log ----"
          tail -200 server.log || true
          exit 1

      - name: Smoke API (PowerShell)
        shell: pwsh
        run: |
          ./scripts/smoke-api.ps1 -Base "http://127.0.0.1:3000" -Mode fresh
          ./scripts/smoke-api.ps1 -Base "http://127.0.0.1:3000" -Mode idempotent

      - name: Unit tests
        run: node --test

      - name: Stop API
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi
          echo "---- server.log ----"
          tail -200 server.log || true


