name: ci

on:
  pull_request: {}
  push:
    branches:
      - main
    tags-ignore:
      - "v*"
      - "rc-*"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: "24.12.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Guard + Unit tests (ci)
        run: npm run ci

      - name: Build (fast)
        run: npm run build:fast
