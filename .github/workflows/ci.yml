name: CI

on:
  pull_request:
  push:
    branches: [ main ]
    tags:
      - "v*.*.*"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kolosseum_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d kolosseum_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30

    env:
      CI: true
      NODE_ENV: test
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/kolosseum_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------
      # Tag gates (tags only)
      # ---------------------------
      - name: Tag must be on main (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          ./scripts/ci-tag-main-gate.ps1

      - name: Version gate (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          node scripts/version-gate.mjs --tag "${GITHUB_REF_NAME}"

      # ---------------------------
      # Node
      # ---------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      # guard + unit tests
      - name: Guard + Unit tests
        run: npm run ci

      - name: Print build version
        run: node -e "import('./dist/src/version.js').then(m => console.log('BUILD_VERSION=' + m.VERSION))"

      - name: Apply schema (drift guard)
        run: node scripts/apply-schema.mjs --db-url "$DATABASE_URL"

      # ---------------------------
      # API start / wait / smoke
      # ---------------------------
      - name: Start API
        run: |
          rm -f server.log server.pid || true
          nohup node dist/src/server.js > server.log 2>&1 &
          echo $! > server.pid
          sleep 1

          echo "PID=$(cat server.pid)"
          if ! kill -0 "$(cat server.pid)" 2>/dev/null; then
            echo "API process is not running right after start."
            echo "---- server.log ----"
            tail -200 server.log || true
            exit 1
          fi

      - name: Wait for /health
        run: |
          set -e
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:3000/health" >/dev/null; then
              echo "API is up (health OK)."
              exit 0
            fi

            # if the process died, fail immediately with logs
            if [ -f server.pid ] && ! kill -0 "$(cat server.pid)" 2>/dev/null; then
              echo "API process died during wait."
              echo "---- server.log ----"
              tail -200 server.log || true
              exit 1
            fi

            sleep 1
          done

          echo "API failed to become healthy within 60s."
          echo "---- server.log ----"
          tail -200 server.log || true
          exit 1

      - name: Smoke API (PowerShell)
        shell: pwsh
        run: |
          ./scripts/smoke-api.ps1 -Base "http://127.0.0.1:3000" -Mode fresh
          ./scripts/smoke-api.ps1 -Base "http://127.0.0.1:3000" -Mode idempotent

      # Always upload logs (helps when a run fails)
      - name: Upload API logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-logs
          path: server.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop API
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi
          echo "---- server.log ----"
          tail -200 server.log || true
