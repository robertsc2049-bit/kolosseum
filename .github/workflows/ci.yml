name: CI

on:
  pull_request:
  push:
    branches: [ main ]
    tags:
      - "v*"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kolosseum_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d kolosseum_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30

    env:
      CI: true
      NODE_ENV: test
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/kolosseum_ci
      UPDATE_GOLDEN: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Guard diff (no BOM, LF-only)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: node ci/guards/diff_line_endings_guard.mjs

      - name: Install
        run: npm ci

      - name: E2E golden (no snapshot writes)
        run: npm run e2e:golden

      - name: Guard + Unit tests
        run: npm run ci

      - name: Build
        run: npm run build

      - name: Print build version
        run: node -e "import('./dist/src/version.js').then(m => console.log('BUILD_VERSION=' + m.VERSION))"

      - name: Apply schema (drift guard)
        run: node scripts/apply-schema.mjs --db-url "$DATABASE_URL"

      - name: E2E golden (engine regression gate)
        run: npm run e2e:golden

      - name: Start API (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          rm -f server.log server.pid || true
          nohup node dist/src/server.js > server.log 2>&1 &
          echo $! > server.pid
          sleep 1

          echo "PID=$(cat server.pid)"
          if ! kill -0 "$(cat server.pid)" 2>/dev/null; then
            echo "API process is not running right after start."
            echo "---- server.log ----"
            tail -200 server.log || true
            exit 1
          fi

      - name: Wait for /health (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -e
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:3000/health" >/dev/null; then
              echo "API is up (health OK)."
              exit 0
            fi

            if [ -f server.pid ] && ! kill -0 "$(cat server.pid)" 2>/dev/null; then
              echo "API process died during wait."
              echo "---- server.log ----"
              tail -200 server.log || true
              exit 1
            fi

            sleep 1
          done

          echo "API failed to become healthy within 60s."
          echo "---- server.log ----"
          tail -200 server.log || true
          exit 1

      - name: Smoke API (PowerShell) (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          ./scripts/smoke-api.ps1 -Base "http://127.0.0.1:3000" -Mode fresh
          ./scripts/smoke-api.ps1 -Base "http://127.0.0.1:3000" -Mode idempotent

      - name: Upload API logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-logs
          path: server.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop API
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi
          echo "---- server.log ----"
          tail -200 server.log || true
