name: vertical-slice

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE*"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vertical-slice-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan_session_api:
    name: plan-session-api
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      KOLOSSEUM_GREEN: "1"
      KOLOSSEUM_GREEN_ENTRYPOINT: "ci"
      SMOKE_NO_DB: "1"
      PORT: "3000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build:fast

      - name: Start server
        run: |
          rm -f /tmp/kolosseum-server.log /tmp/kolosseum-server.pid || true
          node dist/src/main.js >/tmp/kolosseum-server.log 2>&1 &
          echo $! > /tmp/kolosseum-server.pid

      - name: Wait for server readiness (port 3000)
        run: |
          for i in {1..60}; do
            if (echo > /dev/tcp/127.0.0.1/3000) >/dev/null 2>&1; then
              echo "OK: server ready on 127.0.0.1:3000"
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: server did not become ready"
          echo "--- /tmp/kolosseum-server.log (tail) ---"
          tail -n 200 /tmp/kolosseum-server.log || true
          exit 1

      - name: Hit plan-session endpoint
        run: |
          node - <<'NODE'
          const assert = (c, m) => { if (!c) { console.error(m); process.exit(1); } };
          (async () => {
            const url = "http://127.0.0.1:3000/sessions/plan";
            const res = await fetch(url, {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({})
            });

            const json = await res.json().catch(() => null);
            assert(res.ok, "HTTP not ok: " + res.status + " " + JSON.stringify(json));
            assert(json && json.ok === true, "ok !== true: " + JSON.stringify(json));
            assert(json.session && Array.isArray(json.session.exercises) && json.session.exercises.length > 0,
              "missing session.exercises: " + JSON.stringify(json));

            console.log("OK: vertical slice plan-session");
          })().catch((e) => { console.error(e && e.stack ? e.stack : String(e)); process.exit(1); });
          NODE

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/kolosseum-server.pid ]; then
            kill "$(cat /tmp/kolosseum-server.pid)" || true
          fi
          sleep 1

  tier1_smoke_db:
    name: tier1-smoke-db
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kolosseum_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d kolosseum_test"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=30
    env:
      KOLOSSEUM_GREEN: "1"
      KOLOSSEUM_GREEN_ENTRYPOINT: "ci"
      PORT: "3000"
      DATABASE_URL: "postgres://postgres:postgres@127.0.0.1:5432/kolosseum_test"
      KOLOSSEUM_HTTP_E2E_RETURN_GATE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build:fast

      - name: Wait for Postgres
        run: |
          for i in {1..60}; do
            if (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1; then
              echo "OK: postgres port open on 127.0.0.1:5432"
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: postgres port did not open"
          exit 1

      - name: Apply schema
        run: node scripts/apply-schema.mjs --db-url "${DATABASE_URL}"

      - name: Tier-1 smoke (vertical slice with DB)
        run: node --test test/smoke_vertical_slice_plan_start_state.test.mjs