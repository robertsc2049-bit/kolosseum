name: engine-demo

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: engine-demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine_demo:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      KOLOSSEUM_GREEN: "1"
      KOLOSSEUM_GREEN_ENTRYPOINT: "ci"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Engine demo
        run: npm run engine:demo