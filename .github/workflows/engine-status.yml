name: Engine Status

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  engine_status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Engine status check
        shell: pwsh
        run: |
          pwsh ./scripts/engine-health.ps1 -Ci