# ==========================================================
# KOLOSSEUM WORKFLOW POLICY
# ----------------------------------------------------------
# engine-status.yml
# - Runs on:
#     â€¢ push to ALL branches
#     â€¢ pull_request
# - Lightweight signal for feature branches.
# - Complements (does not replace) green/ci gates.
# ==========================================================
name: engine-status

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
      - "rc-*"
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: engine-status-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: guard
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: "24.12.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: "Guard: ban engine-status footgun"
        run: node ci/guards/ban_engine_status_guard.mjs

  smoke:
    name: smoke
    runs-on: ubuntu-latest
    needs: guard

    env:
      NODE_VERSION: "24.12.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (fast)
        run: npm run build:fast

      - name: Engine smoke (no-build)
        run: node scripts/engine_smoke.mjs --fixture examples/hello_world.json --no-build
