name: engine-status

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
      - "rc-*"
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: engine-status-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: guard
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: "24.12.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Guard: ban engine-status footgun
        run: node ci/guards/ban_engine_status_guard.mjs