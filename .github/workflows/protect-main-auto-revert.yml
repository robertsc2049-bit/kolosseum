name: Protect main (auto-revert on CI failure)

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: protect-main-${{ github.sha }}
  cancel-in-progress: false

jobs:
  protect-main:
    name: Auto-revert failing main push
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      REQUIRED_WORKFLOWS_JSON: '["green","ci","runnable-v0","vertical-slice","engine-status"]'

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Wait for required workflows for this main SHA
        id: wait
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TARGET_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          max_attempts=80
          sleep_seconds=15

          required="$(jq -r '.[]' <<< '${{ env.REQUIRED_WORKFLOWS_JSON }}')"

          for attempt in $(seq 1 "$max_attempts"); do
            echo "Polling required workflows for $TARGET_SHA (attempt $attempt/$max_attempts)"

            runs_json="$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/$REPO/actions/runs?head_sha=$TARGET_SHA&event=push&per_page=100")"

            echo "$runs_json" > runs.json

            missing=0
            pending=0
            failed=0
            failure_names=()

            while IFS= read -r workflow_name; do
              row="$(jq -c --arg name "$workflow_name" '
                [
                  .workflow_runs[]
                  | select(.name == $name)
                ]
                | sort_by(.run_number)
                | last // empty
              ' runs.json)"

              if [ -z "$row" ]; then
                echo "Workflow '$workflow_name' not found yet for this SHA."
                missing=1
                continue
              fi

              status="$(jq -r '.status' <<< "$row")"
              conclusion="$(jq -r '.conclusion // ""' <<< "$row")"
              html_url="$(jq -r '.html_url' <<< "$row")"

              echo "Workflow '$workflow_name': status=$status conclusion=$conclusion url=$html_url"

              if [ "$status" != "completed" ]; then
                pending=1
                continue
              fi

              if [ "$conclusion" != "success" ]; then
                failed=1
                failure_names+=("$workflow_name")
              fi
            done <<< "$required"

            if [ "$missing" -eq 0 ] && [ "$pending" -eq 0 ]; then
              if [ "$failed" -eq 1 ]; then
                {
                  echo "decision=revert"
                  echo "failed_sha=$TARGET_SHA"
                  echo "failure_names=$(printf "%s," "${failure_names[@]}" | sed 's/,$//')"
                } >> "$GITHUB_OUTPUT"
              else
                {
                  echo "decision=noop"
                  echo "failed_sha=$TARGET_SHA"
                  echo "failure_names="
                } >> "$GITHUB_OUTPUT"
              fi
              exit 0
            fi

            sleep "$sleep_seconds"
          done

          echo "Timed out waiting for required workflows for $TARGET_SHA"
          {
            echo "decision=timeout"
            echo "failed_sha=$TARGET_SHA"
            echo "failure_names="
          } >> "$GITHUB_OUTPUT"

      - name: Report no-op success path
        if: steps.wait.outputs.decision == 'noop'
        shell: bash
        run: |
          set -euo pipefail
          echo "All required workflows passed for main SHA ${{ steps.wait.outputs.failed_sha }}."
          echo "No revert PR needed."

      - name: Fail if workflow polling timed out
        if: steps.wait.outputs.decision == 'timeout'
        shell: bash
        run: |
          set -euo pipefail
          echo "Timed out waiting for required workflows for main SHA ${{ steps.wait.outputs.failed_sha }}."
          exit 1

      - name: Capture failing main context
        if: steps.wait.outputs.decision == 'revert'
        id: ctx
        shell: bash
        run: |
          set -euo pipefail
          FAILED_SHA="${{ steps.wait.outputs.failed_sha }}"
          BRANCH_NAME="auto/revert-main-${FAILED_SHA:0:8}"
          echo "failed_sha=$FAILED_SHA" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "failure_names=${{ steps.wait.outputs.failure_names }}" >> "$GITHUB_OUTPUT"

      - name: Skip if failed SHA is no longer HEAD of main
        if: steps.wait.outputs.decision == 'revert'
        id: headcheck
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --prune
          CURRENT_MAIN_SHA="$(git rev-parse origin/main)"
          echo "current_main_sha=$CURRENT_MAIN_SHA" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT_MAIN_SHA" != "${{ steps.ctx.outputs.failed_sha }}" ]; then
            echo "skip_revert=true" >> "$GITHUB_OUTPUT"
            echo "Main has moved on; not opening revert PR."
          else
            echo "skip_revert=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if revert branch already exists
        if: steps.wait.outputs.decision == 'revert' && steps.headcheck.outputs.skip_revert == 'false'
        id: branchexists
        shell: bash
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin "${{ steps.ctx.outputs.branch_name }}" >/dev/null 2>&1; then
            echo "branch_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "branch_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create revert branch and commit
        if: steps.wait.outputs.decision == 'revert' && steps.headcheck.outputs.skip_revert == 'false' && steps.branchexists.outputs.branch_exists == 'false'
        shell: bash
        run: |
          set -euo pipefail
          git switch --create "${{ steps.ctx.outputs.branch_name }}" origin/main
          git revert --no-edit "${{ steps.ctx.outputs.failed_sha }}"

      - name: Push revert branch
        if: steps.wait.outputs.decision == 'revert' && steps.headcheck.outputs.skip_revert == 'false' && steps.branchexists.outputs.branch_exists == 'false'
        shell: bash
        run: |
          set -euo pipefail
          git push origin "HEAD:${{ steps.ctx.outputs.branch_name }}"

      - name: Check for existing open PR from revert branch
        if: steps.wait.outputs.decision == 'revert' && steps.headcheck.outputs.skip_revert == 'false'
        id: existingpr
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          PR_NUMBER="$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ steps.ctx.outputs.branch_name }}" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "$PR_NUMBER" ]; then
            echo "pr_exists=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          else
            echo "pr_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open revert PR
        if: steps.wait.outputs.decision == 'revert' && steps.headcheck.outputs.skip_revert == 'false' && steps.existingpr.outputs.pr_exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          BODY_FILE="$(mktemp)"
          cat > "$BODY_FILE" <<EOF
          Emergency revert PR opened automatically because a push to \`main\` failed required workflows.

          Failure context:
          - Failed SHA: \`${{ steps.ctx.outputs.failed_sha }}\`
          - Failed workflows: \`${{ steps.ctx.outputs.failure_names }}\`

          This PR reverts the failing \`main\` commit through the normal protected PR path instead of pushing directly to \`main\`.
          EOF

          gh pr create \
            --repo "${{ github.repository }}" \
            --base main \
            --head "${{ steps.ctx.outputs.branch_name }}" \
            --title "revert: failing main commit ${{ steps.ctx.outputs.failed_sha }}" \
            --body-file "$BODY_FILE"

      - name: Add labels to revert PR
        if: steps.wait.outputs.decision == 'revert' && steps.headcheck.outputs.skip_revert == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          PR_NUMBER="$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ steps.ctx.outputs.branch_name }}" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --add-label "auto-revert" \
              --add-label "main-red"
          fi

      - name: Report revert outcome
        if: steps.wait.outputs.decision == 'revert'
        shell: bash
        run: |
          set -euo pipefail
          echo "Revert decision processed for failing main SHA ${{ steps.ctx.outputs.failed_sha }}."
          echo "Failed workflows: ${{ steps.ctx.outputs.failure_names }}"
