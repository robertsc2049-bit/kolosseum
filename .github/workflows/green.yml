# ==========================================================
# KOLOSSEUM WORKFLOW POLICY
# ----------------------------------------------------------
# green.yml
# - Runs on:
#     - pull_request (all branches)
#     - push to main only
# - Does NOT run on feature branch pushes by design.
# - Heavy validation gate; feature pushes rely on local hook.
#
# This variant formally separates:
#   1) unit (fast, no DB) -> runs npm run green:ci (parity guard requirement)
#   2) integration (DB-backed, spawns dist server)
# ==========================================================
name: green

on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: green-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: "24.12.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Green (CI)
        run: npm run green:ci

  integration:
    name: integration
    runs-on: ubuntu-latest
    needs: [unit]

    env:
      NODE_VERSION: "24.12.0"
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/kolosseum_test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: kolosseum_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kolosseum_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (fast)
        run: npm run build:fast

      - name: Integration (DB-backed)
        run: npm run test:ci:integration