name: release

on:
  push:
    tags:
      - "v*"
      - "rc-*"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kolosseum
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d kolosseum"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30

    env:
      NODE_VERSION: "25.9.0"
      DATABASE_URL: "postgres://postgres:postgres@127.0.0.1:5432/kolosseum"
      PORT: "3000"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Version gate
        run: node scripts/version-gate.mjs --tag "${GITHUB_REF_NAME}"

      - name: Guard + Unit tests (ci)
        run: npm run ci

      - name: Apply schema (drift guard)
        run: node scripts/apply-schema.mjs --db-url "${DATABASE_URL}"

      # RC-only heavy gates
      - name: "RC: Determinism check"
        if: startsWith(github.ref, 'refs/tags/rc-')
        run: npm run determinism:check

      - name: "RC: Golden fixtures"
        if: startsWith(github.ref, 'refs/tags/rc-')
        run: npm run e2e:golden

      - name: Start API
        run: |
          rm -f server.log server.pid || true
          nohup node dist/src/main.js > server.log 2>&1 &
          echo $! > server.pid
          sleep 1

      - name: Wait for /health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:${PORT}/health" >/dev/null; then
              echo "OK: /health"
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: /health never became ready"
          echo "--- server.log (tail) ---"
          tail -n 200 server.log || true
          exit 1

      - name: Stop API
        if: always()
        run: |
          if [ -f server.pid ]; then
            PID="$(cat server.pid)"
            kill "$PID" || true
          fi
          sleep 1