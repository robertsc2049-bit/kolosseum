name: Release Gates

on:
  push:
    tags:
      - "rc-v*.*.*-*"
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gates:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kolosseum_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d kolosseum_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30

    env:
      CI: true
      NODE_ENV: test
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/kolosseum_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Tag must be on main + version gate always (rc + v)
      - name: Tag must be on main
        shell: pwsh
        run: |
          ./scripts/ci-tag-main-gate.ps1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Version gate
        run: |
          node scripts/version-gate.mjs --tag "${GITHUB_REF_NAME}"

      - name: Guard + Unit tests
        run: npm run ci

      - name: Apply schema (drift guard)
        run: node scripts/apply-schema.mjs --db-url "$DATABASE_URL"

      # RC-only heavy gates (you will wire these scripts/tests next)
      - name: RC: Determinism check
        if: startsWith(github.ref, 'refs/tags/rc-')
        run: npm run determinism:check

      - name: RC: Golden fixtures
        if: startsWith(github.ref, 'refs/tags/rc-')
        run: npm run e2e:golden

      - name: Start API
        run: |
          rm -f server.log server.pid || true
          nohup node dist/src/server.js > server.log 2>&1 &
          echo $! > server.pid
          sleep 1

      - name: Wait for /health
        run: |
          set -e
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:3000/health" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "API failed to become healthy within 60s."
          tail -200 server.log || true
          exit 1

      - name: Smoke API (PowerShell)
        shell: pwsh
        run: |
          ./scripts/smoke-api.ps1 -Base "http://127.0.0.1:3000" -Mode fresh
          ./scripts/smoke-api.ps1 -Base "http://127.0.0.1:3000" -Mode idempotent

      - name: Upload API logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-logs
          path: server.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Stop API
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi
          tail -200 server.log || true
